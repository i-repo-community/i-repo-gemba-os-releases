# GitHub Pages（Jekyll）設定。just-the-docs テーマで、既存の Markdown 説明書を
# そのままサイドバー・検索つきドキュメントサイトとして公開する。
title: i-Repo GEMBA OS
description: 現場データを、顧客が選んだデータ基盤に届ける — ダウンロードと説明書
remote_theme: just-the-docs/just-the-docs

# サイトロゴ（マニュアル各ページのサイドバー上部に表示）
logo: "/assets/img/app-icon.png"

# 検索を有効化
search_enabled: true

# トップ以外のページ（docs/ 配下の説明書）も Pages の対象にする
include:
  - "docs"

# Jekyll が無視するもの（_site に出力しない）。
# 注意: install.sh / install.ps1 は **exclude しない**。これらはワンライン導入
#   （curl -fsSL https://i-repo-community.github.io/.../install.sh | bash）の配信元で、
#   exclude すると Pages から 404 になる。フロントマター（先頭が #!/usr/bin/env …）が無いので
#   Jekyll は素の静的ファイルとして /install.sh にそのまま出力し、nav・検索には現れない。
exclude:
  - README.md
  - Gemfile
  - vendor

# 右上リンク
aux_links:
  "ダウンロード（最新リリース）":
    - "https://github.com/i-repo-community/i-repo-gemba-os-releases/releases/latest"
